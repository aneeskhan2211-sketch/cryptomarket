<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryptoMarket – Live Kurse</title>
    <meta name="description" content="High-end crypto market cap tracker with real-time prices and 24h changes" />
    <meta property="og:title" content="Crypto Market Cap Tracker" />
    <meta property="og:description" content="Professional cryptocurrency market data with live price updates" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <script>
      // Apply the saved theme before React mounts to avoid a flash.
      (function () {
        try {
          var raw = localStorage.getItem("cryptomarket.settings.v1");
          var s = raw ? JSON.parse(raw) : null;
          var theme = s && s.theme ? s.theme : "system";
          var colorblind = s && s.colorblind === true;
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = theme === "dark" || (theme === "system" && prefersDark);
          var root = document.documentElement;
          root.classList.toggle("dark", dark);
          root.classList.toggle("light", !dark);
          if (colorblind) root.classList.add("colorblind");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
